<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | DevLearn</title>
    <link rel="stylesheet" href="/src/style-light.css" />
    <style>
      .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f0f4f8 0%, #ffffff 100%);
      }

      .auth-card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        width: 100%;
        max-width: 400px;
        padding: 2.5rem;
      }

      .auth-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .auth-header h1 {
        font-family: 'Poppins', sans-serif;
        font-size: 2rem;
        font-weight: 800;
        color: var(--text-primary);
        margin-bottom: 0.5rem;
      }

      .auth-header p {
        color: var(--text-secondary);
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: var(--text-primary);
      }

      .form-group input {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        font-size: 1rem;
        transition: border-color 0.3s ease;
      }

      .form-group input:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      .remember-me {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
        font-size: 0.95rem;
      }

      .remember-me input {
        width: auto;
        cursor: pointer;
      }

      .submit-btn {
        width: 100%;
        padding: 0.75rem;
        background: var(--primary-color);
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.3s ease;
      }

      .submit-btn:hover {
        background: var(--primary-hover);
      }

      .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        color: var(--text-secondary);
      }

      .auth-footer a {
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 600;
      }

      .auth-footer a:hover {
        text-decoration: underline;
      }

      .back-home {
        text-align: center;
        margin-top: 1rem;
      }

      .back-home a {
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 0.9rem;
      }

      .back-home a:hover {
        color: var(--primary-color);
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h1>Welcome Back</h1>
          <p>Sign in to your DevLearn account</p>
        </div>

        <form id="login-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required />
          </div>

          <div class="remember-me">
            <input type="checkbox" id="remember" name="remember" />
            <label for="remember" style="margin: 0;">Remember me</label>
          </div>

          <button type="submit" class="submit-btn">Sign In</button>
        </form>

        <div class="auth-footer">
          <p>Don't have an account? <a href="/signup.html">Create one</a></p>
          <p><a href="#">Forgot your password?</a></p>
        </div>

        <div class="back-home">
          <a href="/">← Back to Home</a>
        </div>
      </div>
    </div>

    <script>
      document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        // Store in localStorage (demo only - no real backend)
        localStorage.setItem('user_email', email);
        localStorage.setItem('is_logged_in', 'true');
        
        alert('Login successful! (Demo mode)\n\nEmail: ' + email);
        window.location.href = '/dashboard.html';
      });
    </script>
  </body>
</html>
