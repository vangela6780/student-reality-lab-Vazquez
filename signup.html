<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | DevLearn</title>
    <link rel="stylesheet" href="/src/style-light.css" />
    <style>
      .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f0f4f8 0%, #ffffff 100%);
      }

      .auth-card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        width: 100%;
        max-width: 400px;
        padding: 2.5rem;
      }

      .auth-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .auth-header h1 {
        font-family: 'Poppins', sans-serif;
        font-size: 2rem;
        font-weight: 800;
        color: var(--text-primary);
        margin-bottom: 0.5rem;
      }

      .auth-header p {
        color: var(--text-secondary);
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: var(--text-primary);
      }

      .form-group input {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        font-size: 1rem;
        transition: border-color 0.3s ease;
      }

      .form-group input:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      .terms {
        display: flex;
        align-items: flex-start;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
        font-size: 0.9rem;
        color: var(--text-secondary);
      }

      .terms input {
        width: auto;
        cursor: pointer;
        margin-top: 0.25rem;
      }

      .submit-btn {
        width: 100%;
        padding: 0.75rem;
        background: var(--primary-color);
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.3s ease;
      }

      .submit-btn:hover {
        background: var(--primary-hover);
      }

      .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        color: var(--text-secondary);
      }

      .auth-footer a {
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 600;
      }

      .auth-footer a:hover {
        text-decoration: underline;
      }

      .back-home {
        text-align: center;
        margin-top: 1rem;
      }

      .back-home a {
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 0.9rem;
      }

      .back-home a:hover {
        color: var(--primary-color);
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h1>Get Started</h1>
          <p>Join DevLearn today</p>
        </div>

        <form id="signup-form">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Your Name" required />
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required />
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" required />
          </div>

          <div class="terms">
            <input type="checkbox" id="terms" name="terms" required />
            <label for="terms" style="margin: 0;">I agree to the <a href="#" style="color: var(--primary-color);">Terms of Service</a> and <a href="#" style="color: var(--primary-color);">Privacy Policy</a></label>
          </div>

          <button type="submit" class="submit-btn">Create Account</button>
        </form>

        <div class="auth-footer">
          <p>Already have an account? <a href="/login.html">Sign in</a></p>
        </div>

        <div class="back-home">
          <a href="/">← Back to Home</a>
        </div>
      </div>
    </div>

    <script>
      document.getElementById('signup-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (password !== confirmPassword) {
          alert('Passwords do not match!');
          return;
        }

        // Store in localStorage (demo only - no real backend)
        localStorage.setItem('user_name', name);
        localStorage.setItem('user_email', email);
        localStorage.setItem('is_logged_in', 'true');
        
        alert('Account created successfully! (Demo mode)\n\nName: ' + name + '\nEmail: ' + email);
        window.location.href = '/dashboard.html';
      });
    </script>
  </body>
</html>
